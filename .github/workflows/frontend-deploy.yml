name: Frontend CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install
      - run: npm run build

 
  deploy:
    needs: build-test
    if: github.event_name == 'workflow_dispatch'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      
      - name: Create .env
        run: |
          cat <<'EOF' > .env
          VITE_API_URL=${{ secrets.VITE_API_URL }}
          # Добавь сюда другие переменные фронтенда, если есть
          EOF

      - name: Docker Deploy
        run: |
          docker compose up -d --build --remove-orphans
          docker image prune -f
